<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel admina - Power Energy</title>
  <meta name="description" content="Panel administracyjny do zarzadzania opiniami klientow.">
  <meta name="author" content="Paula Wach">

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap&subset=latin-ext" rel="stylesheet">
  <link rel="stylesheet" href="../style/style.css" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="header">
  <a class="logo" href="../">
    <img src="../image/logo.jpg" alt="Power Energy">
    <span>Power Energy</span>
  </a>
  <nav>
    <a href="../">Start</a>
    <a href="../cennik/">Cennik</a>
    <a href="../o-mnie/">O Mnie</a>
    <a href="../opinie/">Opinie</a>

  </nav>
</header>

<section class="section glass" data-aos="fade-up">
  <h2>Panel administratora</h2>

  <div id="adminLoginBox">
    <p class="highlight">Podaj haslo, aby zarzadzac opiniami.</p>
    <form id="adminLoginForm">
      <input type="password" id="adminPassword" placeholder="Haslo admina" required>
      <button type="submit">Zaloguj</button>
    </form>
  </div>

  <div id="adminPanel" style="display:none;">
    <div class="cta">
      <button id="adminLogout">Wyloguj</button>
    </div>
    <div class="cards" id="adminOpinie"></div>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="../script/script.js"></script>

</body>
</html>
