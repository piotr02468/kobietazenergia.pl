<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Energy – Paula Wach</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css" />
  
</head>
<body>
<canvas id="energyCanvas"></canvas>
<header class="header">
  <div class="logo">
    <img src="image/logo.jpg" alt="logo">
    <span>Power Energy</span>
  </div>
</header>

<!-- 🔥 HERO PREMIUM -->
<section class="hero">
  

  <div class="hero-content">
    <h1 class="fade-up">POWER ENERGY</h1>
    <h2 class="fade-up delay">Kobieta z energią</h2>

    <p class="fade-up delay2">
      Ja zajmuję się prądem.<br>
      Ty zajmij się swoim życiem.
    </p>

    <div class="cta fade-up delay3">
      <button onclick="scrollToContact()">Skontaktuj się</button>
      <button onclick="scrollToContact()">Sprawdź oszczędności</button>
    </div>
  </div>

  <div class="hero-image">
    <img src="image/twarz.jpg" alt="Paula">
  </div>

</section>

<!-- 🔥 PROBLEM -->
<section class="section fade">
  <h2>Wiesz, kto przepłaca?</h2>

  <div class="cards">
    <div class="card">Źle złożony wniosek</div>
    <div class="card">Przekroczone terminy</div>
    <div class="card">Zła taryfa</div>
    <div class="card">Godziny na infolinii</div>
  </div>
</section>

<!-- 🔥 ROZWIĄZANIE -->
<section class="section fade">
  <h2>Zrobię to za Ciebie</h2>

  <div class="cards">
    <div class="card">Wnioski</div>
    <div class="card">Umowy</div>
    <div class="card">Telefony</div>
    <div class="card">Terminy</div>
  </div>
</section>

<!-- 🔥 KONTAKT -->
<section id="kontakt" class="section fade">
  <h2>Kontakt</h2>
  <button>Umów konsultację</button>
</section>

<script src="script/script.js"></script>

</body>
</html>
