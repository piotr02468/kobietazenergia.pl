<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opinie klientów - Paula Wach | Doradca energetyczny</title>
  <meta name="description" content="Zobacz opinie klientów o współpracy z Paulą Wach. Rzetelne doradztwo energetyczne i realne oszczędności.">
  <meta name="keywords" content="opinie, doradca energetyczny, Paula Wach, rekomendacje, oszczędność energii">
  <meta name="author" content="Paula Wach">

  <!-- FONTY -->
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap&subset=latin-ext" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../style/style.css" />

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

<canvas id="bg-canvas"></canvas>

<!-- HEADER -->
<header class="header">
  <a class="logo" href="../">
    <img src="../image/logo.jpg" alt="Power Energy">
    <span>Power Energy</span>
  </a>
  <nav>
    <a href="../">Start</a>
    <a href="../cennik/">Cennik</a>
    <a href="../o-mnie/">O Mnie</a>
    <a href="../opinie/">Opinie</a>

  </nav>
</header>

<!-- OPINIE -->
<section class="section glass" data-aos="fade-up" id="opinie">
  <h2>Opinie klientów</h2>

  <div class="cards" id="opinieList">
    <div class="card">Opinie ładują się...</div>
  </div>

  <p class="highlight">
    Masz podobną historię? Dodaj opinię i podziel się nią z innymi.
  </p>
  
  <form id="form">
    <input type="text" placeholder="Imię" id="name" required>
    <textarea placeholder="Twoja opinia" id="text" required></textarea>
    <select id="rating">
        <option value="5">5 ⭐</option>
        <option value="4">4 ⭐</option>
        <option value="3">3 ⭐</option>
        <option value="2">2 ⭐</option>
        <option value="1">1 ⭐</option>
    </select>
    <button type="submit">Dodaj opinię</button>
  </form>
</section>



<!-- CTA FINAL -->
<section id="kontakt" class="section" data-aos="fade-up">
  <h2>Skontaktuj się ze mną</h2>

  <p class="highlight">
    Razem przekształcimy niepotrzebne koszty w inwestycje
  </p>

  <div class="cta">
    <button onclick="window.location.href='mailto:Paula.wach@onet.pl'">Napisz wiadomość</button>
  </div>
</section>

<!-- SCRIPT -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="../script/script.js"></script>


</body>
</html>
